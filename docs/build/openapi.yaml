    post:
      tags: [acquisition]
      operationId: acqReceive
      summary: Register received copies (→ КСУ → ToCat).
      description: Staff-only, `acquisition` module. Requires grant `acq.receipt/<defaultDb>/write`. Registers received copies against an order, writes the КСУ summary and queues for cataloging. Audited.
