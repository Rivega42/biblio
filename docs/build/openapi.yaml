openapi: 3.1.0
info:
  title: IRBIS64 web backend API
  version: "0.1.0"
  license:
    name: Proprietary
    url: https://github.com/Rivega42/biblio
  description: |
    Contract-first REST API for the `irbis-web` project (GitHub issue #116).

    This document is the **single source of truth** for the request/response
    contract between the Vite/React/TS frontend (`frontend/src/api.ts`) and any
    backend that implements it. Two backends exist today:

    - `backend/` — adapter over a live IRBIS64 server (`core.py` `Api.route()`).
    - `server-own/` — our own PostgreSQL/SQLite server (`server-own/app.py`),
      implementing the same contract (strangler migration).

    The schemas below mirror the TypeScript interfaces in `frontend/src/api.ts`
    exactly (types and optionality). The prose guide lives in `API_CONTRACT.md`.

    ## Response envelope
    Every JSON response is wrapped in an envelope:
    - success: `{ "ok": true, "data": <T> }`
    - error:   `{ "ok": false, "error": { "code": string, "message": string } }`

    Binary responses (cover image) return raw bytes with a `Content-Type`.

    ## Authentication
    Bearer token obtained from `POST /api/auth/{guest|staff|reader}` and sent as
    `Authorization: Bearer <token>`. Because `<img>`/`<a>` cannot set headers, the
    cover endpoint additionally accepts the token as a `?t=<token>` query param.

    Authorization is `(function x db x level)` grants. Guest sessions get
    read-only `search`/`record.read`/`terms`/`file`; reader sessions add
    `order` (write) and `cabinet` (read); staff sessions get DB-stored grants.

servers:
  - url: /
    description: Same-origin (frontend talks to `/api/*` on its own host).

tags:
  - name: auth
    description: Session creation. Endpoints are public (no token required).
  - name: catalog
    description: Search, browse, and read catalog records. Requires a session.
  - name: reader
    description: Reader self-service (orders, personal cabinet).
  - name: cataloging
    description: Staff cataloging (worklist, record write). Requires grants.
  - name: circulation
    description: Staff circulation desk (issue/return/renew, reader formulary, fines). Requires grants.
  - name: acquisition
    description: Staff acquisition desk (АРМ Комплектатор — orders, receipt, КСУ). Staff-only, module-gated.
  - name: book-provision
    description: Staff book-provision desk (Книгообеспеченность — faculties, specialties, disciplines, Кко reports). Staff-only, module-gated.
  - name: admin
    description: Staff administration (users/roles/audit/databases) and platform control plane (tenants/billing/PDn-access journal). Staff-only; super-admin for the control plane.
  - name: privacy
    description: 152-ФЗ privacy layer — reader consent + right-to-erasure, and the staff PDn-access journal (audit finding V9/V5). Reader for self-service; DPO/admin for the journal.
  - name: system
    description: Health and database metadata.

security:
  - bearerAuth: []

paths:
  /api/health:
    get:
      tags: [system]
      operationId: getHealth
      summary: Server health and default-database stats.
      description: Public. Returns IRBIS server address, version, default db and max MFN.
      security: []
      responses:
        "200":
          description: Health snapshot.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Health"
        "4XX":
          $ref: "#/components/responses/ApiErrorResponse"

  /api/auth/guest:
    post:
      tags: [auth]
      operationId: authGuest
      summary: Create a guest session.
      description: Public. Returns a bearer token with the implicit guest grant set.
      security: []
      responses:
        "200":
          description: Guest session created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthResult"
        "4XX":
          $ref: "#/components/responses/ApiErrorResponse"

  /api/auth/staff:
    post:
      tags: [auth]
      operationId: authStaff
      summary: Authenticate a staff account.
      description: Public. Validates login/password against the access store.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Staff session created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials (`auth_failed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/auth/reader:
    post:
      tags: [auth]
      operationId: authReader
      summary: Authenticate a reader by library-ticket number.
      description: |
        Public. Looks the ticket up in the RDR database (`RI=<ticket>`).
        Returns a reader session bound to the reader record MFN.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticket]
              properties:
                ticket:
                  type: string
                  description: Library ticket number (RDR field RI).
      responses:
        "200":
          description: Reader session created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthResult"
        "400":
          description: Missing ticket (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          description: Reader not found (`auth_failed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/databases:
    get:
      tags: [system]
      operationId: listDatabases
      summary: List accessible databases.
      description: |
        Requires a session (any kind). Reads the server database-list menu and
        flags each entry `public` (false for service/authority DBs).
      responses:
        "200":
          description: Database list with the default db.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [items, default]
                        properties:
                          items:
                            type: array
                            items:
                              $ref: "#/components/schemas/DbItem"
                          default:
                            type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/search:
    get:
      tags: [catalog]
      operationId: search
      summary: Search a database.
      description: |
        Requires grant `search/<db>/read`. Provide either a prefix+term pair
        (`prefix`,`q`) or a raw IRBIS expression (`expr`). The server builds the
        expression as `"<prefix>=<q>"` (A/T prefixes get a trailing `$` for
        right-truncation) when `expr` is absent. Results are paginated.
      parameters:
        - $ref: "#/components/parameters/Db"
        - name: prefix
          in: query
          required: false
          schema:
            type: string
            default: K
          description: Dictionary prefix (e.g. K=keyword, A=author, T=title). Used with `q`.
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search term. Mutually combined with `prefix`; ignored if `expr` is set.
        - name: expr
          in: query
          required: false
          schema:
            type: string
          description: Raw IRBIS search expression. Takes precedence over `prefix`/`q`.
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Search result page.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SearchResult"
        "400":
          description: Neither `q` nor `expr` supplied (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/facets:
    get:
      tags: [catalog]
      operationId: facets
      summary: Compute facet value counts for a query.
      description: |
        Requires grant `search/<db>/read`. Same query input as `/api/search`
        (`prefix`+`q` or `expr`). Returns facet groups (docType, lang, author)
        with per-value counts derived from sub-search COUNTs.
      parameters:
        - $ref: "#/components/parameters/Db"
        - name: prefix
          in: query
          required: false
          schema:
            type: string
            default: K
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: expr
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Facet groups for the query.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FacetsResult"
        "400":
          description: Neither `q` nor `expr` supplied (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/terms:
    get:
      tags: [catalog]
      operationId: terms
      summary: Read dictionary terms from a database.
      description: |
        Requires grant `terms/<db>/read`. Reads `count` terms starting at `start`
        from the database dictionary (used for autocomplete / browse).
      parameters:
        - $ref: "#/components/parameters/Db"
        - name: start
          in: query
          required: false
          schema:
            type: string
            default: ""
          description: Dictionary start term (e.g. `A=`). Empty starts from the top.
        - name: count
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 15
          description: Number of terms to return (clamped to 1..50).
      responses:
        "200":
          description: Dictionary terms.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [db, terms]
                        properties:
                          db:
                            type: string
                          start:
                            type: string
                          terms:
                            type: array
                            items:
                              $ref: "#/components/schemas/Term"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/record/{db}/{mfn}:
    parameters:
      - $ref: "#/components/parameters/PathDb"
      - $ref: "#/components/parameters/PathMfn"
    get:
      tags: [catalog]
      operationId: getRecord
      summary: Read a full record.
      description: Requires grant `record.read/<db>/read`. Returns all fields plus a brief format.
      responses:
        "200":
          description: Record data.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RecordData"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [cataloging]
      operationId: saveRecord
      summary: Create or overwrite a record.
      description: |
        Requires grant `record.write/<db>/write` (staff). `mfn=0` creates a new
        record (the assigned MFN is returned). Each field `value` already carries
        its `^`-prefixed subfields. Writes are audited.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fields]
              properties:
                fields:
                  type: array
                  items:
                    type: object
                    required: [tag, value]
                    properties:
                      tag:
                        type: string
                      value:
                        type: string
      responses:
        "200":
          description: Save result (assigned MFN, created flag, IRBIS return code).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [db, mfn, created, returnCode]
                        properties:
                          db:
                            type: string
                          mfn:
                            type: integer
                          created:
                            type: boolean
                          returnCode:
                            type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/cover/{db}/{mfn}:
    get:
      tags: [catalog]
      operationId: getCover
      summary: Embedded cover image (binary).
      description: |
        Requires grant `record.read/<db>/read`. Returns the cover image bytes
        embedded in field 953 (subfield ^B). Because `<img>` cannot send an
        `Authorization` header, the token may be passed as `?t=<token>`.
      parameters:
        - $ref: "#/components/parameters/PathDb"
        - $ref: "#/components/parameters/PathMfn"
        - name: t
          in: query
          required: false
          schema:
            type: string
          description: Bearer token alternative for `<img>`/`<a>` requests.
      responses:
        "200":
          description: Image bytes.
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: No embedded cover (`not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/order:
    post:
      tags: [reader]
      operationId: createOrder
      summary: Place an order (reservation) for a record.
      description: |
        Requires grant `order/<db>/write` (reader). P0 validates and audits the
        order and returns a queued marker; the RQST integration is a TODO.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfn]
              properties:
                db:
                  type: string
                  description: Database code. Defaults to the server default db when omitted.
                mfn:
                  type: integer
      responses:
        "200":
          description: Order queued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [db, mfn, status]
                        properties:
                          db:
                            type: string
                          mfn:
                            type: integer
                          status:
                            type: string
                            examples: [queued]
                          note:
                            type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/me/cabinet:
    get:
      tags: [reader]
      operationId: getCabinet
      summary: Reader personal cabinet (loans / formulary).
      description: |
        Reader session only. Requires grant `cabinet/*/read`. Returns the
        reader's name and current loans (RDR field 40).
      responses:
        "200":
          description: Cabinet data.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CabinetData"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Non-reader session (`forbidden`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/worklist/{db}:
    get:
      tags: [cataloging]
      operationId: getWorklist
      summary: Cataloging worklist (DynamicField profile) for a database.
      description: |
        Staff session only (guest/reader -> 403). Requires grant
        `record.write/<db>/write` and the `cataloging` module entitlement (you
        load the editor for a base you may write). Returns the field worklist that
        drives the cataloging DynamicField editor: a curated book worklist for
        IBIS/PAZK and a small generic fallback for any other base, so a new editor
        always renders a usable form.
      parameters:
        - $ref: "#/components/parameters/PathDb"
      responses:
        "200":
          description: Worklist profile.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [db, fields]
                        properties:
                          db:
                            type: string
                          fields:
                            type: array
                            items:
                              $ref: "#/components/schemas/WorklistField"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/circ/reader:
    get:
      tags: [circulation]
      operationId: circReader
      summary: Reader formulary for the circulation desk.
      description: |
        Staff session only (guest/reader -> 403). Requires grant
        `circ.issue/<defaultDb>/read` and the `circulation` module entitlement.
        Looks the reader up by library-ticket number (a desk read) and returns the
        reader's debt summary plus on-hand loans (РДР field 40). The reader is
        lazily registered in the circulation engine on first desk contact.
      parameters:
        - name: ticket
          in: query
          required: true
          schema:
            type: string
          description: Library ticket number (RDR field RI).
      responses:
        "200":
          description: Reader formulary (reader summary, on-hand loans, desk messages).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CircReaderResult"
        "400":
          description: Missing ticket (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/circ/issue:
    post:
      tags: [circulation]
      operationId: circIssue
      summary: Issue (lend) a copy to a reader.
      description: |
        Staff session only (guest/reader -> 403). Requires grant
        `circ.issue/<defaultDb>/write` and the `circulation` module entitlement.
        Runs the circulation engine's checkout (loan limits + debtor gate) and, on
        ALLOW, flips the catalog exemplar 910^A 0->1. A denied decision is surfaced
        `403` (`circ_denied`); a decision that needs a staff override is surfaced
        `409` (`circ_denied`) with its machine reasons in the error message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticket, item]
              properties:
                ticket:
                  type: string
                  description: Library ticket number.
                db:
                  type: string
                  description: Database code. Defaults to the server default db when omitted.
                item:
                  type: string
                  description: Copy identifier (shifr / inventory / barcode).
      responses:
        "200":
          description: Loan created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CircIssueResult"
        "400":
          description: Missing ticket or item (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            Non-staff session / missing grant / module not licensed (`forbidden`),
            or a denied checkout decision (`circ_denied`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "409":
          $ref: "#/components/responses/CircDenied"

  /api/circ/return:
    post:
      tags: [circulation]
      operationId: circReturn
      summary: Return (take back) a copy from a reader.
      description: |
        Staff session only (guest/reader -> 403). Requires grant
        `circ.return/<defaultDb>/write` and the `circulation` module entitlement.
        Resolves the (ticket, item) on-hand loan and runs the engine's return
        (fixes any overdue fine, makes the next queued hold ready, flips the
        catalog exemplar 910^A 1->0).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticket, item]
              properties:
                ticket:
                  type: string
                  description: Library ticket number.
                db:
                  type: string
                  description: Database code. Defaults to the server default db when omitted.
                item:
                  type: string
                  description: Copy identifier (shifr / inventory / barcode).
      responses:
        "200":
          description: Copy returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CircReturnResult"
        "400":
          description: Missing ticket or item (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: No on-hand loan of the item for this reader (`not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "409":
          $ref: "#/components/responses/CircDenied"

  /api/circ/renew:
    post:
      tags: [circulation]
      operationId: circRenew
      summary: Renew (prolong) a loan.
      description: |
        Staff session only (guest/reader -> 403). Requires grant
        `circ.issue/<defaultDb>/write` and the `circulation` module entitlement.
        Resolves the (ticket, item) on-hand loan and runs the engine's renew
        (holds-block-renewal + renew cap + debtor gate). A plain block is surfaced
        `403` (`circ_denied`); a block that needs a staff override is surfaced
        `409` (`circ_denied`) with its machine reasons in the error message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ticket, item]
              properties:
                ticket:
                  type: string
                  description: Library ticket number.
                db:
                  type: string
                  description: Database code. Defaults to the server default db when omitted.
                item:
                  type: string
                  description: Copy identifier (shifr / inventory / barcode).
      responses:
        "200":
          description: Loan renewed.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CircRenewResult"
        "400":
          description: Missing ticket or item (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            Non-staff session / missing grant / module not licensed (`forbidden`),
            or a denied renew decision (`circ_denied`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "404":
          description: No on-hand loan of the item for this reader (`not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "409":
          $ref: "#/components/responses/CircDenied"

  /api/circ/fines:
    get:
      tags: [circulation]
      operationId: circFines
      summary: Outstanding fines for a reader.
      description: |
        Staff session only (guest/reader -> 403). Requires grant
        `circ.issue/<defaultDb>/read` and the `circulation` module entitlement.
        Returns the reader's outstanding (accrued/charged) fines with the running
        total and policy currency.
      parameters:
        - name: ticket
          in: query
          required: true
          schema:
            type: string
          description: Library ticket number (RDR field RI).
      responses:
        "200":
          description: Outstanding fines.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CircFinesResult"
        "400":
          description: Missing ticket (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/storage:
    get:
      tags: [catalog]
      operationId: getStorage
      summary: Physical storage tree with geometry and occupancy.
      description: |
        Returns the full location tree (rooms/shelves/cells) with geometry and
        occupancy, for the storage map view.

        NOTE: This endpoint is part of the typed client contract (`api.ts`) and
        is implemented by `server-own/app.py`. The IRBIS adapter (`core.py`
        `Api.route()`) does **not** currently implement it — calls there return
        `404 not_found`. See the discrepancy note in `API_CONTRACT.md`.
      parameters:
        - $ref: "#/components/parameters/Db"
      responses:
        "200":
          description: Storage tree.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [db, tree, holdings]
                        properties:
                          db:
                            type: string
                          tree:
                            type: array
                            items:
                              $ref: "#/components/schemas/StorageNode"
                          holdings:
                            type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========================================================================
  # Catalog read surfaces (showcase / rubricator / example-queries / validate /
  # record read / cover / render / resource / vocab / classification). All are
  # session-guarded; the public OPAC ones run the public-DB guard (V11) so a
  # guest/reader can never reach a service/ПДн base (RDR/LICH/LOG*).
  # ========================================================================
  /api/showcase:
    get:
      tags: [catalog]
      operationId: showcase
      summary: Home-page showcase shelf (new / popular).
      description: |
        Requires grant `search/<db>/read` and passes the public-DB guard. Returns
        a small curated shelf (`kind`=new|popular, clamped `limit`) of brief cards.
      parameters:
        - $ref: "#/components/parameters/Db"
        - name: kind
          in: query
          required: false
          schema:
            type: string
            default: new
          description: Shelf kind (new | popular).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
      responses:
        "200":
          description: Showcase shelf.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/EnvelopeOk"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          db:
                            type: string
                          kind:
                            type: string
                          items:
                            type: array
                            items:
                              $ref: "#/components/schemas/ResultItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/rubricator:
    get:
      tags: [catalog]
      operationId: rubricator
      summary: Browse a classification/rubricator tree level.
      description: |
        Requires grant `search/<db>/read` and passes the public-DB guard. Reads a
        slice of dictionary terms under a prefix for the rubricator browse view.
      parameters:
        - $ref: "#/components/parameters/Db"
        - name: prefix
          in: query
          required: false
          schema:
            type: string
        - name: start
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
      responses:
        "200":
          description: Rubricator level.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/example-queries:
    get:
      tags: [catalog]
      operationId: exampleQueries
      summary: Seeded example queries for a database.
      description: Requires grant `search/<db>/read`. Returns a static list of example search expressions to seed the search UI.
      parameters:
        - $ref: "#/components/parameters/Db"
      responses:
        "200":
          description: Example queries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/validate:
    post:
      tags: [cataloging]
      operationId: validateRecord
      summary: Validate a draft record against the worklist rules.
      description: |
        Requires a session. Runs the cataloging validation rules over a draft
        record (does not write). Returns a list of validation messages.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                db:
                  type: string
                fields:
                  type: array
                  items:
                    type: object
                    properties:
                      tag:
                        type: string
                      value:
                        type: string
      responses:
        "200":
          description: Validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/render/{db}/{mfn}:
    get:
      tags: [catalog]
      operationId: renderRecord
      summary: Server-formatted record (PFT format).
      description: |
        Requires grant `record.read/<db>/read` and passes the public-DB guard.
        Returns the record rendered with a server PFT format (`fmt`, default
        `@brief`).
      parameters:
        - $ref: "#/components/parameters/PathDb"
        - $ref: "#/components/parameters/PathMfn"
        - name: fmt
          in: query
          required: false
          schema:
            type: string
            default: "@brief"
          description: Server format name (e.g. @brief, @full).
      responses:
        "200":
          description: Rendered record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/resource/{db}/{name}:
    get:
      tags: [catalog]
      operationId: getResource
      summary: Read an attached resource (full-text / image) by name.
      description: |
        Requires grant `record.read/<db>/read` and passes the public-DB guard.
        Returns an attached resource stream (full text / embedded file) identified
        by `name`.
      parameters:
        - $ref: "#/components/parameters/PathDb"
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Resource name (attachment identifier).
      responses:
        "200":
          description: Resource bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: No such resource (`not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/vocab:
    get:
      tags: [system]
      operationId: listVocab
      summary: List available controlled vocabularies.
      description: Requires a session. Returns the set of vocabulary names the cataloging UI can resolve.
      responses:
        "200":
          description: Vocabulary list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/vocab/{name}:
    get:
      tags: [system]
      operationId: getVocab
      summary: Read one controlled vocabulary by name.
      description: Requires a session. Returns the entries of a named controlled vocabulary (menu source).
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vocabulary entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/classification/{name}:
    get:
      tags: [system]
      operationId: getClassification
      summary: Read a classification tree by name.
      description: Requires a session. Returns a named classification/rubricator tree for the browse UI.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Classification tree.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/me/modules:
    get:
      tags: [system]
      operationId: getMyModules
      summary: Module entitlements for the current session/tenant.
      description: Requires a session. Returns the set of licensed functional modules the session may use (drives which desks render).
      responses:
        "200":
          description: Enabled modules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ========================================================================
  # Reader portal — holds, notifications inbox, reading lists (shelves),
  # reviews/ratings, recommendations, reading history, saved searches.
  # Writes require a reader session; reviews/recommendations are guest-readable.
  # ========================================================================
  /api/hold:
    post:
      tags: [reader]
      operationId: placeHold
      summary: Place (or return the existing) hold for the reader.
      description: |
        Reader session. Requires grant `order/<defaultDb>/write` and passes the
        public-DB guard. Places a hold on `(db, mfn)` and returns the hold with its
        queue position (idempotent — returns the existing hold if already placed).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfn]
              properties:
                db:
                  type: string
                mfn:
                  type: integer
      responses:
        "200":
          description: Hold placed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing mfn (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/holds:
    get:
      tags: [reader]
      operationId: listHolds
      summary: The reader's live holds with queue positions.
      description: Reader session. Requires grant `order/<defaultDb>/write`. Returns the reader's active holds.
      responses:
        "200":
          description: Holds list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/hold/cancel:
    post:
      tags: [reader]
      operationId: cancelHold
      summary: Cancel the reader's own hold.
      description: Reader session. Requires grant `order/<defaultDb>/write`. Cancels a hold by `holdId` (404 if not the reader's hold).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [holdId]
              properties:
                holdId:
                  type: integer
      responses:
        "200":
          description: Hold cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing holdId (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Hold not found (`not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/notifications:
    get:
      tags: [reader]
      operationId: notificationsInbox
      summary: The reader's notifications inbox + unread count.
      description: Reader session. Requires grant `cabinet/*/read`. Returns dispatched notices (optionally `unread=1` only) and the unread count.
      parameters:
        - name: unread
          in: query
          required: false
          schema:
            type: string
          description: When 1/true/yes, returns only unread notices.
      responses:
        "200":
          description: Inbox.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/notifications/read:
    post:
      tags: [reader]
      operationId: notificationsRead
      summary: Mark one or all notifications read.
      description: Reader session. Requires grant `cabinet/*/read`. Marks one notice (`id`) or all (`all:true`) read; returns the new unread count.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                all:
                  type: boolean
      responses:
        "200":
          description: Updated unread count.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Neither id nor all supplied (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/shelves:
    get:
      tags: [reader]
      operationId: shelvesList
      summary: The reader's reading lists (shelves).
      description: Reader session. Requires grant `cabinet/*/read`. Returns the reader's reading lists (system lists seeded lazily).
      responses:
        "200":
          description: Reading lists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [reader]
      operationId: shelfCreate
      summary: Create a custom reading list.
      description: Reader session. Requires grant `cabinet/*/read`. Creates a named reading list for the reader.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: List created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/shelves/item:
    post:
      tags: [reader]
      operationId: shelfAddItem
      summary: Add a record to a reading list.
      description: Reader session. Requires grant `cabinet/*/read`. Adds `(db, mfn)` to the list `listId` (deduped).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listId, mfn]
              properties:
                listId:
                  type: string
                db:
                  type: string
                mfn:
                  type: integer
      responses:
        "200":
          description: Item added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing mfn (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: List not found (`not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/shelves/item/remove:
    post:
      tags: [reader]
      operationId: shelfRemoveItem
      summary: Remove a record from a reading list.
      description: Reader session. Requires grant `cabinet/*/read`. Removes `(db, mfn)` from the list `listId`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listId, mfn]
              properties:
                listId:
                  type: string
                db:
                  type: string
                mfn:
                  type: integer
      responses:
        "200":
          description: Item removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing mfn (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: List not found (`not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/review:
    post:
      tags: [reader]
      operationId: postReview
      summary: Upsert the reader's review of a record.
      description: |
        Reader session. Passes the public-DB guard. Creates or updates the reader's
        review (rating + text) of `(db, mfn)`. Bound to the reader's ticket in our
        own store (a reader edits only their own review).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfn]
              properties:
                db:
                  type: string
                mfn:
                  type: integer
                rating:
                  type: integer
                text:
                  type: string
      responses:
        "200":
          description: Review upserted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing mfn / invalid rating (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/review/delete:
    post:
      tags: [reader]
      operationId: deleteReview
      summary: Delete the reader's own review.
      description: Reader session. Deletes a review by `id` only if it belongs to the reader (403 otherwise).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
      responses:
        "200":
          description: Review deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing id (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not the reader's review (`forbidden`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/reviews:
    get:
      tags: [reader]
      operationId: listReviews
      summary: Reviews for a record (avg/count + cards).
      description: |
        Requires grant `search/<db>/read` and passes the public-DB guard.
        Guest-readable. Returns the average rating, count and review cards for
        `(db, mfn)`; a reader session additionally gets its own review (`mine`).
      parameters:
        - $ref: "#/components/parameters/Db"
        - name: mfn
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing mfn (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/recommendations:
    get:
      tags: [reader]
      operationId: recommendations
      summary: Records similar to a seed record.
      description: |
        Requires grant `search/<db>/read` and passes the public-DB guard.
        Guest-readable. Returns records "similar" to the seed `(db, mfn)`.
      parameters:
        - $ref: "#/components/parameters/Db"
        - name: mfn
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Similar records.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing mfn (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/recommendations/foryou:
    get:
      tags: [reader]
      operationId: recommendationsForYou
      summary: Personalized recommendations from the reader's history.
      description: Reader session only. Returns recommendations derived from the reader's reading history (requires the opt-in history).
      responses:
        "200":
          description: Personalized recommendations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/history:
    get:
      tags: [reader]
      operationId: readingHistory
      summary: The reader's reading history (opt-in).
      description: |
        Reader session only. Returns the reader's reading history (deduped, capped).
        History is an **opt-in** personal record (152-ФЗ minimization + ALA ethics):
        kept only when the reader enabled it (consent `reading_history`).
      responses:
        "200":
          description: Reading history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/savedsearch:
    get:
      tags: [reader]
      operationId: savedSearches
      summary: The reader's saved searches.
      description: Reader session only. Returns the reader's saved search definitions.
      responses:
        "200":
          description: Saved searches.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [reader]
      operationId: saveSearch
      summary: Persist a saved search.
      description: Reader session only. Persists a saved search (name + db + prefix + query).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                db:
                  type: string
                prefix:
                  type: string
                query:
                  type: string
      responses:
        "200":
          description: Saved search persisted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Invalid input (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/savedsearch/delete:
    post:
      tags: [reader]
      operationId: deleteSavedSearch
      summary: Delete the reader's own saved search.
      description: Reader session only. Deletes a saved search by `id` (404 if not the reader's).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
      responses:
        "200":
          description: Saved search deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing id (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Saved search not found (`not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

