            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/pdn-access:
    get:
      tags: [privacy]
      operationId: pdnAccessLog
      summary: PDn-access journal export (152-ФЗ / ФСТЭК РСБ — finding V5).
      description: |
        DPO / security-admin only (high grant). Exports the append-only journal of
        access to readers' personal data (`pdn_access_log`) for a subject and/or a
        period, for Roskomnadzor/ФСТЭК checks and for the ст.14 subject response.
        By-reference (field categories, not values); the export itself is journaled
        (meta-audit). Spec: SPEC_compliance_152fz §3; policy: CONSENT_POLICY §5.
        This route lands the V5 access-journal of the audit baseline.
      parameters:
        - name: subjectId
          in: query
          required: false
          schema:
            type: string
          description: Filter to one subject (by id; PDn is referenced, not embedded).
        - name: from
          in: query
          required: false
          schema:
            type: string
          description: Period start (ISO date/time).
        - name: to
          in: query
          required: false
          schema:
            type: string
          description: Period end (ISO date/time).
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        "200":
          description: PDn-access journal slice (category-level, no PDn values).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ========================================================================
  # Privacy layer — 152-ФЗ consent + right-to-erasure (audit finding V9).
  # Reader self-service: grant/list consent, request erasure. Erasure scope is
  # OUR stored data (reviews/holds/shelves/history/circulation/resolved name),
  # NOT the source ИРБИС RDR record. Spec: SPEC_compliance_152fz §2/§4;
  # policy: CONSENT_POLICY.
  # ========================================================================
  /api/reader/consent:
    get:
      tags: [privacy]
      operationId: getConsent
      summary: The reader's effective consents by purpose.
      description: |
        Reader session. Returns the reader's effective consent per purpose
        (base_processing, reading_history, notifications, public_social_profile,
        transfer_esia/smev/eios, photo_950, marketing) with the policy version each
        was granted against. Spec: SPEC_compliance_152fz §2; policy: CONSENT_POLICY §2.
      responses:
        "200":
          description: Effective consents.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [privacy]
      operationId: setConsent
      summary: Grant or withdraw consent for a purpose.
      description: |
        Reader session. Records a consent decision (`status` granted|withdrawn) for
        a `purpose`, bound to the current privacy-policy version. Append-only: a
        withdrawal is a new row, never an overwrite (provability). Spec:
        SPEC_compliance_152fz §2.5; policy: CONSENT_POLICY §2/§4.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [purpose, status]
              properties:
                purpose:
                  type: string
                  enum:
                    - base_processing
                    - reading_history
                    - notifications
                    - public_social_profile
                    - transfer_esia
                    - transfer_smev
                    - transfer_eios
                    - photo_950
                    - marketing
                status:
                  type: string
                  enum: [granted, withdrawn]
      responses:
        "200":
          description: Consent recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing/invalid purpose or status (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/reader/erase:
    post:
      tags: [privacy]
      operationId: requestErasure
      summary: Request right-to-erasure (право на забвение).
      description: |
        Reader session. Opens an `erasure_request` over the reader's OWN stored
        data: direct identifiers (resolved name, ticket binding), reviews, shelves,
        saved searches, opt-in history are deleted; completed loans / archive are
        anonymized (`subject_id`→`anon:`) to keep stats/КСУ valid; consents are
        kept (provability); the PDn-access journal is pseudonymized. Scope is OUR
        storage, NOT the source ИРБИС RDR record (managed by the operator). Active
        loans/debts put the request `on_hold`. Spec: SPEC_compliance_152fz §4;
        policy: CONSENT_POLICY §3. Lands the V9 erasure path of the audit baseline.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional free-text reason for the request.
      responses:
        "200":
          description: Erasure request opened (submitted | on_hold) with its id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token from `POST /api/auth/{guest|staff|reader}`. The cover
        endpoint also accepts the same token via the `?t=` query parameter.

  parameters:
    Db:
      name: db
      in: query
      required: false
      schema:
        type: string
      description: Database code. Defaults to the server default db (e.g. IBIS) when omitted.
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: 1-based page number.
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20
      description: Page size (clamped to 1..50).
    PathDb:
      name: db
      in: path
      required: true
      schema:
        type: string
      description: Database code.
    PathMfn:
      name: mfn
      in: path
      required: true
      schema:
        type: integer
      description: Master file number (record id within the database).

  responses:
    ApiErrorResponse:
      description: Error envelope (e.g. bad_request, internal).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvelopeError"
    Unauthorized:
      description: No / invalid session (`unauthorized`).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvelopeError"
    Forbidden:
      description: Required grant missing (`forbidden`).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvelopeError"
    CircDenied:
      description: |
        Circulation decision denied (`circ_denied`); the error message carries the
        engine's machine reasons (comma-separated). For issue/renew this is the
        override-required path — a plain denial without an override is `403`.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvelopeError"

  schemas:
    Envelope:
      type: object
      description: Base response envelope. `ok` discriminates success vs error.
      required: [ok]
      properties:
        ok:
          type: boolean

    EnvelopeOk:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          required: [ok, data]
          properties:
            ok:
              type: boolean
              const: true
            data:
              description: Endpoint-specific payload (refined per operation).

    EnvelopeError:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          required: [ok, error]
          properties:
            ok:
              type: boolean
              const: false
            error:
              $ref: "#/components/schemas/ApiError"

    ApiError:
      type: object
      description: Error detail (no internal specifics leaked).
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g. unauthorized, forbidden, bad_request, not_found, irbis, internal).
        message:
          type: string

    Health:
      type: object
      required: [server, version, db, maxmfn]
      properties:
        server:
          type: string
          description: IRBIS server address `host:port`.
        version:
          type: string
        db:
          type: string
          description: Default database code.
        maxmfn:
          type: integer

    AuthResult:
      type: object
      description: |
        Session payload. Shape varies by session kind: guest -> `{token, kind}`;
        reader -> `{token, kind, name, mfn}`; staff -> `{token, kind, login, name, grants}`.
      required: [token, kind]
      properties:
        token:
          type: string
        kind:
          type: string
          enum: [guest, reader, staff]
        name:
          type: string
          description: Display name (reader/staff).
        login:
          type: string
          description: Staff login.
        mfn:
          type: integer
          description: Reader record MFN.
        grants:
          type: array
          description: Effective staff grants.
          items:
            $ref: "#/components/schemas/Grant"

    DbItem:
      type: object
      required: [code, name, public]
      properties:
        code:
          type: string
        name:
          type: string
        public:
          type: boolean
          description: false for service/authority databases hidden from public reader search.

    ResultItem:
      type: object
      description: Brief catalog card (one search hit).
      required: [mfn, title]
      properties:
        mfn:
          type: integer
        title:
          type: string
        author:
          type: string
        year:
          type: string
        docType:
          type: string
        availability:
          type: string
          enum: [available, issued, unknown]
        hasCover:
          type: boolean

    SearchResult:
      type: object
      required: [db, expr, total, page, pageSize, items]
      properties:
        db:
          type: string
        expr:
          type: string
          description: Effective IRBIS expression used for the search.
        total:
          type: integer
          description: Total hit count (across all pages).
        page:
          type: integer
        pageSize:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/ResultItem"

    FieldVal:
      type: object
      description: One record field. `value` is the raw field; `subfields` maps `^`-codes.
      required: [tag, value, subfields]
      properties:
        tag:
          type: string
        value:
          type: string
        text:
          type: string
        subfields:
          type: object
          additionalProperties:
            type: string

    Holding:
      type: object
      description: |
        Copy/holding row. Produced by the own-server backend; optional on
        `RecordData`. Not populated by the IRBIS adapter's record read.
      required: [inv_no, status, cell, rfid]
      properties:
        inv_no:
          type: string
        status:
          type: string
        cell:
          type: string
        rfid:
          type: string
        location:
          type: string

    RecordData:
      type: object
      required: [db, mfn, fields]
      properties:
        db:
          type: string
        mfn:
          type: integer
        version:
          type: string
        brief:
          type: string
          description: Server-formatted brief (@brief), empty on format failure.
        hasCover:
          type: boolean
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldVal"
        holdings:
          type: array
          items:
            $ref: "#/components/schemas/Holding"

    StorageNode:
      type: object
      description: |
        Location-tree node. Container nodes (room/shelf) carry `children` and
        `cellsTotal`/`cellsOccupied`; leaf nodes (cell/slot) carry occupancy.
      required: [id, kind, code]
      properties:
        id:
          type: integer
        kind:
          type: string
          description: room | shelf | cell | slot | ...
        code:
          type: string
        name:
          type: string
        address:
          type: string
        size:
          type: string
        gx:
          type: number
        gy:
          type: number
        gw:
          type: number
        gh:
          type: number
        cellsTotal:
          type: integer
        cellsOccupied:
          type: integer
        occupied:
          type: boolean
        status:
          type: string
        title:
          type: string
        inv:
          type: string
        mfn:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/StorageNode"

    Term:
      type: object
      required: [count, term]
      properties:
        count:
          type: integer
        term:
          type: string

    FacetValue:
      type: object
      required: [value, label, count]
      properties:
        value:
          type: string
        label:
          type: string
        count:
          type: integer

    Facet:
      type: object
      required: [field, prefix, label, values]
      properties:
        field:
          type: string
          description: Logical facet name (docType, lang, author).
        prefix:
          type: string
          description: Dictionary prefix used to derive values (V, J, A).
        label:
          type: string
        values:
          type: array
          items:
            $ref: "#/components/schemas/FacetValue"

    FacetsResult:
      type: object
      required: [db, expr, facets]
      properties:
        db:
          type: string
        expr:
          type: string
        facets:
          type: array
          items:
            $ref: "#/components/schemas/Facet"

    Grant:
      type: object
      description: Authorization grant `(function x db x level)`.
      required: [function, db, level]
      properties:
        function:
          type: string
        db:
          type: string
          description: Database code or `*` (wildcard).
        level:
          type: string
          enum: [read, write, admin]

    Loan:
      type: object
      required: [value, subfields]
      properties:
        value:
          type: string
        subfields:
          type: object
          additionalProperties:
            type: string

    CabinetData:
      type: object
      required: [mfn, name, loans, loanCount]
      properties:
        mfn:
          type: integer
        name:
          type: string
        loans:
          type: array
          items:
            $ref: "#/components/schemas/Loan"
        loanCount:
          type: integer

    WorklistSubfield:
      type: object
      description: One subfield entry inside a worklist field.
      required: [code, label, type]
      properties:
        code:
          type: string
          description: Subfield code (e.g. a, e, f).
        label:
          type: string
        type:
          type: string
          description: Editor control (text/menu/dict/tree/bool/authority/date).

    WorklistField:
      type: object
      description: |
        One field entry in the cataloging worklist, driving the DynamicField
        editor. `type` maps to an editor control
        (text/menu/dict/tree/bool/authority/date).
      required: [code, label, type]
      properties:
        code:
          type: string
          description: IRBIS field tag (e.g. 200, 700).
        label:
          type: string
        type:
          type: string
          description: Editor control (text/menu/dict/tree/bool/authority/date).
        required:
          type: boolean
        repeatable:
          type: boolean
        options:
          type: array
          description: Menu options (present when `type` is `menu`).
          items:
            type: string
        subfields:
          type: array
          items:
            $ref: "#/components/schemas/WorklistSubfield"

    CircReaderInfo:
      type: object
      description: |
        Reader debt summary for the circulation desk. Carries both the canonical
        engine view (`debtLevel`/`onHand`/`outstanding`) and the desk view
        (`debtor`/`finesTotal`/`blocks`).
      required: [ticket, name, debtLevel, onHand, outstanding, debtor, finesTotal, blocks]
      properties:
        ticket:
          type: string
        name:
          type: string
          description: Reader display name (may be empty).
        debtLevel:
          type: string
          enum: [none, soft, hard]
        onHand:
          type: integer
          description: Count of on-hand (not returned) loans.
        outstanding:
          type: number
          description: Total outstanding fine amount.
        debtor:
          type: boolean
          description: True when `debtLevel` is `hard`.
        finesTotal:
          type: number
          description: Alias of `outstanding` (desk view).
        blocks:
          type: array
          description: Human-readable desk blocks/warnings (debtor / overdue).
          items:
            type: string

    CircLoan:
      type: object
      description: One on-hand loan card (РДР field-40 model) for the desk.
      required: [loanId, db, item, title, issued, due, renewals, lostStatus, returned, overdue, renewable]
      properties:
        loanId:
          type: integer
        db:
          type: string
        item:
          type: string
          description: Copy identifier (shifr / inventory).
        title:
          type: string
          description: Resolved brief title (best-effort; may be empty).
        issued:
          type: number
          description: Checkout time (epoch seconds).
        due:
          type: number
          description: Planned return time (epoch seconds).
        renewals:
          type: integer
        lostStatus:
          type: string
          enum: [none, lost_candidate, lost]
        returned:
          type: boolean
        overdue:
          type: boolean
        renewable:
          type: boolean

    CircReaderResult:
      type: object
      required: [reader, loans, messages]
      properties:
        reader:
          $ref: "#/components/schemas/CircReaderInfo"
        loans:
          type: array
          items:
            $ref: "#/components/schemas/CircLoan"
        messages:
          type: array
          description: Desk service messages (mirrors `reader.blocks`).
          items:
            type: string

    CircIssueResult:
      type: object
      description: |
        Result of a checkout. `catalogMfn`/`exemplarStatus` are present only when
        the loan resolved to a catalog exemplar (910^A flipped).
      required: [loanId, ticket, item, due]
      properties:
        loanId:
          type: integer
        ticket:
          type: string
        item:
          type: string
        due:
          type: number
          description: Planned return time (epoch seconds).
        catalogMfn:
          type: integer
        exemplarStatus:
          type: string
          description: Exemplar status flag after issue (910^A; `1` = on loan).

    CircReturnResult:
      type: object
      description: |
        Result of a return. `fineCharged` appears when an overdue fine was fixed,
        `holdReady` when returning the copy made the next queued hold ready, and
        `catalogMfn`/`exemplarStatus` when a catalog exemplar was flipped.
      required: [ok, loanId, ticket, item]
      properties:
        ok:
          type: boolean
          const: true
        loanId:
          type: integer
        ticket:
          type: string
        item:
          type: string
        fineCharged:
          type: number
          description: Amount of the overdue fine charged on return.
        holdReady:
          type: integer
          description: Hold id made ready by this return, if any.
        catalogMfn:
          type: integer
        exemplarStatus:
          type: string
          description: Exemplar status flag after return (910^A; `0` = available).

    CircRenewResult:
      type: object
      required: [loanId, ticket, item, due]
      properties:
        loanId:
          type: integer
        ticket:
          type: string
        item:
          type: string
        due:
          type: number
          description: New planned return time (epoch seconds).

    CircFine:
      type: object
      description: One outstanding fine row for a reader.
      required: [id, fineId, loanId, amount, kind, status, reason, paid]
      properties:
        id:
          type: integer
        fineId:
          type: integer
          description: Alias of `id`.
        loanId:
          type: integer
          description: Loan the fine is attached to.
        amount:
          type: number
        kind:
          type: string
          enum: [fine_overdue, lost_replacement]
        status:
          type: string
          enum: [accrued, charged]
          description: Outstanding statuses only (paid/waived are excluded).
        reason:
          type: string
          description: Alias of `kind`.
        paid:
          type: boolean
          description: True when `status` is `paid` (always false for outstanding rows).

    CircFinesResult:
      type: object
      required: [ticket, total, currency, items]
      properties:
        ticket:
          type: string
        total:
          type: number
          description: Total outstanding amount.
        currency:
          type: string
          description: Fine currency (policy, e.g. RUB).
        items:
          type: array
          items:
            $ref: "#/components/schemas/CircFine"
