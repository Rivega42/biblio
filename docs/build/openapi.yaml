  # ========================================================================
  # АРМ Администратор — staff-only (#187). Account/role admin under
  # `admin.users`, audit/database surfaces under `admin.db`. The platform
  # control plane (tenants/billing) is super-admin (`admin.db` at admin level).
  # ========================================================================
  /api/admin/users:
    get:
      tags: [admin]
      operationId: adminUsers
      summary: List staff accounts with roles + effective grants.
      description: Staff admin. Requires grant `admin.users`. Returns every staff account with its roles and effective grants.
      responses:
        "200":
          description: Accounts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [admin]
      operationId: adminCreateUser
      summary: Create a staff account (hashed password) + assign roles.
      description: |
        Staff admin. Requires grant `admin.users`. Creates a staff account; the
        password is stored as a pbkdf2-sha256 salted hash (never plaintext — audit
        finding V3). Roles assigned as in the seed. Audited.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login]
              properties:
                login:
                  type: string
                password:
                  type: string
                fullName:
                  type: string
                roles:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing login (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Login already exists (`conflict`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/admin/users/roles:
    post:
      tags: [admin]
      operationId: adminSetRoles
      summary: Replace an account's roles.
      description: Staff admin. Requires grant `admin.users`. Replaces the role set of `userId`. Audited.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, roles]
              properties:
                userId:
                  type: integer
                roles:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Roles replaced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing userId (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Unknown user (`not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/admin/users/active:
    post:
      tags: [admin]
      operationId: adminSetActive
      summary: Enable/disable a staff account.
      description: Staff admin. Requires grant `admin.users`. Sets the active flag of `userId`. Audited.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, active]
              properties:
                userId:
                  type: integer
                active:
                  type: boolean
      responses:
        "200":
          description: Active flag updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing userId (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Unknown user (`not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/admin/roles:
    get:
