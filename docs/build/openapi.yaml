  # State lives in our own acquisition store; the live ИРБИС server is never
  # written. Order → receive → КСУ → ToCat. Writes are audited.
  # ========================================================================
  /api/acq/order:
    post:
      tags: [acquisition]
      operationId: acqOrder
      summary: Open an acquisition order line (заказ).
      description: Staff-only, `acquisition` module. Requires grant `acq.receipt/<defaultDb>/write`. Opens an order line. Audited.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                author:
                  type: string
                supplier:
                  type: string
                copies:
                  type: integer
                price:
                  type: number
                fundingSource:
                  type: string
      responses:
        "200":
          description: Order opened.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Invalid order (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    get:
      tags: [acquisition]
      operationId: acqOrderStatus
      summary: Read an acquisition order + its status.
      description: Staff-only, `acquisition` module. Requires grant `acq.read/<defaultDb>/read`. Returns the order row identified by `id`.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order row.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Unknown order (`not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/acq/order/cancel:
    post:
      tags: [acquisition]
      operationId: acqCancel
      summary: Cancel an acquisition order.
      description: Staff-only, `acquisition` module. Requires grant `acq.receipt/<defaultDb>/write`. Cancels an order (refused if anything was already received).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
      responses:
        "200":
          description: Order cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing id / already received (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

