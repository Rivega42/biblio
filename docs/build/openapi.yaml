                  type: string
      responses:
        "200":
          description: Copies received.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeOk"
        "400":
          description: Missing/invalid fields (`bad_request`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/acq/ksu:
    get:
      tags: [acquisition]
      operationId: acqKsu
      summary: КСУ summary row.
      description: Staff-only, `acquisition` module. Requires grant `acq.read/<defaultDb>/read`. Returns the КСУ summary row (88^E/^F/^G) for `no`.
