<!-- @dsCard group="Components" name="Обратная связь" viewport="700x520" subtitle="Алерты, тосты, скелетоны, состояния, модалка заказа" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-page); }
  .wrap { display: flex; flex-direction: column; gap: 16px; }
  .lbl { font: var(--weight-semibold) var(--text-2xs)/1 var(--font-ui); text-transform: uppercase;
    letter-spacing: var(--tracking-caps); color: var(--text-subtle); margin-bottom: 10px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .group + .group { border-top: 1px solid var(--border-subtle); padding-top: 16px; }
  .panel { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const NS = window.DesignSystem_d9a584;
const { Alert, Toast, Skeleton, SkeletonResult, EmptyState, Badge, Button } = NS;
function Demo() {
  return (
    <div className="wrap">
      <div className="group grid2">
        <Alert variant="success" title="Заказ принят">Экземпляр поставлен в очередь выдачи.</Alert>
        <Alert variant="warning" title="Экземпляр занят">Выберите другой экземпляр или место выдачи.</Alert>
        <Alert variant="error" title="Каталог недоступен" onClose={()=>{}}>Узел временно не отвечает. Попробуйте позже.</Alert>
        <Alert variant="info">Полный текст доступен в читальном зале после авторизации.</Alert>
      </div>
      <div className="group">
        <div className="lbl">Тосты</div>
        <div className="grid2">
          <div style={{position:"relative"}}><Toast variant="success" title="Запись отмечена" onClose={()=>{}} /></div>
          <div style={{position:"relative"}}><Toast variant="error" title="Не удалось заказать" onClose={()=>{}}>Экземпляр уже выдан.</Toast></div>
        </div>
      </div>
      <div className="group">
        <div className="lbl">Бейджи</div>
        <div style={{display:"flex", gap:"8px", flexWrap:"wrap", alignItems:"center"}}>
          <Badge variant="accent">Пьеса</Badge>
          <Badge variant="success">Полный текст</Badge>
          <Badge variant="warning">Цензура</Badge>
          <Badge variant="neutral">Либретто</Badge>
          <Badge variant="solid" count>3</Badge>
        </div>
      </div>
      <div className="group">
        <div className="lbl">Скелетоны загрузки</div>
        <div style={{display:"flex", flexDirection:"column", gap:"8px"}}>
          <SkeletonResult />
          <SkeletonResult showThumb />
        </div>
      </div>
      <div className="group grid2">
        <div className="panel"><EmptyState title="Ничего не найдено" description="По запросу записей нет." hints={["Уберите часть условий","Включите усечение"]} action={<Button variant="secondary" size="sm" iconLeft="rotate-ccw">Сбросить</Button>} /></div>
        <div className="panel"><EmptyState variant="locked" title="Требуется вход" description="Войдите по номеру читательского билета." action={<Button size="sm" iconLeft="log-in">Войти</Button>} /></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
