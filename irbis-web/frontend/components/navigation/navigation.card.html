<!-- @dsCard group="Components" name="Навигация · Вкладки" viewport="700x220" subtitle="Вкладки с подчёркиванием и pill-режим" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-page); }
  .wrap { display: flex; flex-direction: column; gap: 22px; }
  .lbl { font: var(--weight-semibold) var(--text-2xs)/1 var(--font-ui); text-transform: uppercase;
    letter-spacing: var(--tracking-caps); color: var(--text-subtle); margin-bottom: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Tabs } = window.DesignSystem_d9a584;
function Demo() {
  const [t1, setT1] = React.useState("orders");
  const [t2, setT2] = React.useState("grid");
  return (
    <div className="wrap">
      <div>
        <div className="lbl">Подчёркивание — разделы ЛК / карточки</div>
        <Tabs value={t1} onChange={setT1} tabs={[
          {id:"loans", label:"Выдачи", count:3},
          {id:"orders", label:"Заказы", count:1},
          {id:"history", label:"История"},
        ]} />
      </div>
      <div>
        <div className="lbl">Pill — переключатель вида</div>
        <Tabs variant="pill" value={t2} onChange={setT2} tabs={[
          {id:"list", label:"Список", icon:"list"},
          {id:"grid", label:"Галерея", icon:"grid"},
        ]} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
