<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-page); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const NS = window.DesignSystem_d9a584;
const { FileViewer, Button } = NS;
function Demo() {
  const [open, setOpen] = React.useState("pdf");
  return (
    <div>
      <div className="row">
        <Button variant="secondary" iconLeft="file-text" onClick={()=>setOpen("pdf")}>PDF (полный текст)</Button>
        <Button variant="secondary" iconLeft="image" onClick={()=>setOpen("img")}>Изображение эскиза</Button>
        <Button variant="ghost" iconLeft="log-in" onClick={()=>setOpen("locked")}>Без прав</Button>
      </div>
      <FileViewer open={open==="pdf"} file={{ field:"951", label:"Чайка — полный текст", kind:"pdf", pages:84 }} canView onClose={()=>setOpen(null)} />
      <FileViewer open={open==="img"} file={{ field:"955", label:"Эскиз декорации, III акт", kind:"image", tint:18 }} canView onClose={()=>setOpen(null)} />
      <FileViewer open={open==="locked"} file={{ field:"955", label:"Электронная версия", kind:"pdf", pages:84, requiresAuth:true }} canView={false} onClose={()=>setOpen(null)} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
