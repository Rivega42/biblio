<!-- @dsCard group="Colors" name="Акцент — винный (театральный)" viewport="700x170" subtitle="Скин читателя: глубокий гранат на пергаменте" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px;background:#F3ECDD;font-family:var(--font-ui);}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:10px;}
  .sw{border-radius:var(--radius-md);border:1px solid #D2BF9E;overflow:hidden;}
  .chip{height:48px;}
  .meta{padding:6px 8px;background:#FBF6EC;}
  .nm{font-size:var(--text-2xs);font-weight:var(--weight-semibold);color:#241C16;}
  .hex{font-size:var(--text-2xs);font-family:var(--font-mono);color:#6A584A;}
  .demo{display:flex;gap:10px;align-items:center;}
  .btn{background:var(--wine-500);color:#FBF6EC;padding:9px 16px;border-radius:var(--radius-md);font-weight:var(--weight-semibold);font-size:var(--text-sm);}
  .lnk{color:var(--wine-600);font-weight:var(--weight-medium);font-size:var(--text-sm);}
  .ser{font-family:var(--font-serif);color:#241C16;font-size:var(--text-lg);font-weight:700;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--wine-700)"></div><div class="meta"><div class="nm">wine-700</div><div class="hex">#561D28</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wine-600)"></div><div class="meta"><div class="nm">wine-600</div><div class="hex">#682530</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wine-500)"></div><div class="meta"><div class="nm">wine-500 ·акцент</div><div class="hex">#7A2E3A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wine-100)"></div><div class="meta"><div class="nm">wine-100</div><div class="hex">#EFD9DA</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--wine-50)"></div><div class="meta"><div class="nm">wine-50</div><div class="hex">#F6EAE9</div></div></div>
  </div>
  <div class="demo">
    <span class="btn">Заказать</span>
    <span class="ser">Либретто оперы</span>
    <a class="lnk" href="#">подробнее</a>
  </div>
</body></html>
