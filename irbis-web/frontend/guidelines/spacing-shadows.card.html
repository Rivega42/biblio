<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:24px;background:var(--bg-page);font-family:var(--font-ui);}
  .row{display:flex;gap:22px;align-items:center;}
  .b{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .sq{width:88px;height:62px;background:var(--surface-card);border-radius:var(--radius-md);}
  .nm{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="b"><div class="sq" style="box-shadow:var(--shadow-xs)"></div><span class="nm">shadow-xs</span></div>
    <div class="b"><div class="sq" style="box-shadow:var(--shadow-sm)"></div><span class="nm">shadow-sm</span></div>
    <div class="b"><div class="sq" style="box-shadow:var(--shadow-md)"></div><span class="nm">shadow-md</span></div>
    <div class="b"><div class="sq" style="box-shadow:var(--shadow-lg)"></div><span class="nm">shadow-lg</span></div>
  </div>
</body></html>
