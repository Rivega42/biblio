<!-- @dsCard group="Type" name="Текст и интерфейс" viewport="700x270" subtitle="Основной текст и плотные каталожные данные" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--bg-page);font-family:var(--font-body);color:var(--text-body);}
  .line{display:flex;align-items:baseline;gap:14px;padding:7px 0;border-bottom:1px solid var(--border-subtle);}
  .line:last-child{border-bottom:none;}
  .tok{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--text-subtle);white-space:nowrap;}
  .muted{color:var(--text-muted);}
  .subtle{color:var(--text-subtle);}
</style></head>
<body>
  <div class="line"><span style="font-size:var(--text-md)">Чайка: комедия в четырёх действиях — крупный текст</span><span class="tok">text-md · 18</span></div>
  <div class="line"><span style="font-size:var(--text-base)">Основной текст библиографического описания и аннотаций.</span><span class="tok">text-base · 16</span></div>
  <div class="line"><span class="muted" style="font-size:var(--text-sm)">Чехов А. П. · 1896 · Книга — плотные данные результатов</span><span class="tok">text-sm · 14</span></div>
  <div class="line"><span class="subtle" style="font-size:var(--text-xs)">Инвентарный номер, подписи полей, частоты словаря</span><span class="tok">text-xs · 13</span></div>
  <div class="line"><span class="subtle" style="font-size:var(--text-2xs);text-transform:uppercase;letter-spacing:var(--tracking-caps)">Метка · база поиска</span><span class="tok">text-2xs · 12</span></div>
</body></html>
