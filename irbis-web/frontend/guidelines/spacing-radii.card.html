<!-- @dsCard group="Spacing" name="Радиусы" viewport="700x150" subtitle="Скругления: поля/кнопки md, карточки lg, модалки xl" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px;background:var(--bg-page);font-family:var(--font-ui);}
  .row{display:flex;gap:14px;align-items:flex-end;}
  .b{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .sq{width:62px;height:62px;background:var(--accent-weak);border:1.5px solid var(--accent);}
  .nm{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="b"><div class="sq" style="border-radius:var(--radius-xs)"></div><span class="nm">xs · 3</span></div>
    <div class="b"><div class="sq" style="border-radius:var(--radius-sm)"></div><span class="nm">sm · 5</span></div>
    <div class="b"><div class="sq" style="border-radius:var(--radius-md)"></div><span class="nm">md · 8</span></div>
    <div class="b"><div class="sq" style="border-radius:var(--radius-lg)"></div><span class="nm">lg · 12</span></div>
    <div class="b"><div class="sq" style="border-radius:var(--radius-xl)"></div><span class="nm">xl · 16</span></div>
    <div class="b"><div class="sq" style="border-radius:var(--radius-pill)"></div><span class="nm">pill</span></div>
  </div>
</body></html>
