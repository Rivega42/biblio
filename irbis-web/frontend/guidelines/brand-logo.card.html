<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:0;background:var(--bg-page);font-family:var(--font-ui);}
  .grid{display:grid;grid-template-columns:1fr 1fr;}
  .cell{display:flex;align-items:center;justify-content:center;height:95px;}
  .light{background:var(--paper-0);color:var(--blue-500);}
  .dark{background:var(--blue-700);color:var(--paper-0);}
  .wine{background:#F3ECDD;color:var(--wine-500);}
  .mono{background:var(--ink-0);color:var(--paper-0);}
  img{height:54px;}
  .mk{height:46px;}
</style></head>
<body>
  <div class="grid">
    <div class="cell light"><img src="../assets/logo-irbis.svg" alt="ИРБИС веб-каталог" /></div>
    <div class="cell dark"><img src="../assets/logo-irbis.svg" alt="ИРБИС веб-каталог" /></div>
    <div class="cell wine"><img src="../assets/logo-irbis.svg" alt="ИРБИС веб-каталог" /></div>
    <div class="cell mono">
      <img class="mk" src="../assets/mark-irbis.svg" alt="" />
      <img src="../assets/logo-irbis.svg" alt="ИРБИС веб-каталог" style="margin-left:18px" />
    </div>
  </div>
</body></html>
