<!-- @dsCard group="Colors" name="Основа — бумага" viewport="700x150" subtitle="Тёплые нейтральные поверхности" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px;background:var(--bg-page);font-family:var(--font-ui);}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .sw{border-radius:var(--radius-md);border:1px solid var(--border-subtle);overflow:hidden;}
  .chip{height:60px;}
  .meta{padding:7px 9px;background:var(--surface-card);}
  .nm{font-size:var(--text-xs);font-weight:var(--weight-semibold);color:var(--text-strong);}
  .hex{font-size:var(--text-2xs);font-family:var(--font-mono);color:var(--text-subtle);}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--paper-0)"></div><div class="meta"><div class="nm">paper-0</div><div class="hex">#FBFAF7</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-1)"></div><div class="meta"><div class="nm">paper-1</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-2)"></div><div class="meta"><div class="nm">paper-2</div><div class="hex">#F4F1EA</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-3)"></div><div class="meta"><div class="nm">paper-3</div><div class="hex">#ECE7DD</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-4)"></div><div class="meta"><div class="nm">paper-4</div><div class="hex">#E2DBCD</div></div></div>
  </div>
</body></html>
