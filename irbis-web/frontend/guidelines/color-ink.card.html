<!-- @dsCard group="Colors" name="Чернила — текст" viewport="700x150" subtitle="Графитовая шкала текста на бумаге" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px;background:var(--bg-page);font-family:var(--font-ui);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .tile{border-radius:var(--radius-md);border:1px solid var(--border-subtle);background:var(--surface-card);padding:12px;}
  .big{font-size:var(--text-xl);font-weight:var(--weight-bold);}
  .nm{font-size:var(--text-xs);font-weight:var(--weight-semibold);margin-top:8px;color:var(--text-strong);}
  .hex{font-size:var(--text-2xs);font-family:var(--font-mono);color:var(--text-subtle);}
</style></head>
<body>
  <div class="row">
    <div class="tile"><div class="big" style="color:var(--ink-0)">Аа Бб</div><div class="nm">ink-0 · заголовки</div><div class="hex">#1C1B19</div></div>
    <div class="tile"><div class="big" style="color:var(--ink-1)">Аа Бб</div><div class="nm">ink-1 · текст</div><div class="hex">#2E2C28</div></div>
    <div class="tile"><div class="big" style="color:var(--ink-2)">Аа Бб</div><div class="nm">ink-2 · вторичный</div><div class="hex">#57534B</div></div>
    <div class="tile"><div class="big" style="color:var(--ink-3)">Аа Бб</div><div class="nm">ink-3 · приглушённый</div><div class="hex">#8A847A</div></div>
  </div>
</body></html>
