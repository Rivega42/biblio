<!-- @dsCard group="Type" name="Дисплейная шкала" viewport="700x300" subtitle="Заголовки · гротеск (рабочая тема)" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--bg-page);font-family:var(--font-display);color:var(--text-strong);}
  .line{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px solid var(--border-subtle);}
  .line:last-child{border-bottom:none;}
  .t{font-weight:var(--weight-bold);letter-spacing:var(--tracking-tight);line-height:1.15;}
  .tok{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--text-subtle);white-space:nowrap;}
</style></head>
<body>
  <div class="line"><span class="t" style="font-size:var(--text-4xl)">Театр</span><span class="tok">text-4xl · 48</span></div>
  <div class="line"><span class="t" style="font-size:var(--text-3xl)">Каталог библиотеки</span><span class="tok">text-3xl · 38</span></div>
  <div class="line"><span class="t" style="font-size:var(--text-2xl)">Электронный каталог</span><span class="tok">text-2xl · 30</span></div>
  <div class="line"><span class="t" style="font-size:var(--text-xl)">Карточка записи</span><span class="tok">text-xl · 24</span></div>
  <div class="line"><span class="t" style="font-size:var(--text-lg)">Предметные рубрики</span><span class="tok">text-lg · 20</span></div>
</body></html>
