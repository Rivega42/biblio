<!-- @dsCard group="Spacing" name="Шкала отступов" viewport="700x200" subtitle="Сетка 4px" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--bg-page);font-family:var(--font-ui);}
  .line{display:flex;align-items:center;gap:12px;padding:4px 0;}
  .bar{height:14px;background:var(--accent);border-radius:2px;}
  .nm{width:88px;font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-muted);}
  .px{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-subtle);}
</style></head>
<body>
  <div class="line"><span class="nm">space-1</span><span class="bar" style="width:4px"></span><span class="px">4</span></div>
  <div class="line"><span class="nm">space-2</span><span class="bar" style="width:8px"></span><span class="px">8</span></div>
  <div class="line"><span class="nm">space-3</span><span class="bar" style="width:12px"></span><span class="px">12</span></div>
  <div class="line"><span class="nm">space-4</span><span class="bar" style="width:16px"></span><span class="px">16</span></div>
  <div class="line"><span class="nm">space-6</span><span class="bar" style="width:24px"></span><span class="px">24</span></div>
  <div class="line"><span class="nm">space-8</span><span class="bar" style="width:32px"></span><span class="px">32</span></div>
  <div class="line"><span class="nm">space-12</span><span class="bar" style="width:48px"></span><span class="px">48</span></div>
  <div class="line"><span class="nm">space-16</span><span class="bar" style="width:64px"></span><span class="px">64</span></div>
</body></html>
