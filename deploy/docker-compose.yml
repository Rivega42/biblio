# ─────────────────────────────────────────────────────────────────────────────
# Biblio — one-command deployment stack (MVP Phase 2 · #207, epic #223)
#
#   cd deploy
#   cp .env.example .env            # then edit secrets (see CHANGE IN PROD markers)
#   sh proxy/gen-cert.sh            # dev self-signed TLS cert
#   docker compose up --build       # → https://localhost
#
# Topology (backend-serves-dist):
#   proxy (nginx, TLS) ── https://localhost ──▶ backend (Python) ──▶ db (Postgres)
#                                                  └─ serves API + built SPA (dist)
#
# Services:
#   db       postgres:16  — Access store (accounts/grants/audit/tenancy), volume+healthcheck
#   backend  server.py    — API + SPA; depends_on db healthy; ACCESS_BACKEND=postgres
#   proxy    nginx        — TLS termination + reverse proxy to backend
#
# Volumes:
#   pgdata        — PostgreSQL data (persists across recreate)
#   backend-data  — runtime sqlite stores for engines that still use sqlite
#                   (notify/catalog/circ/acq/bp); access goes to Postgres.
#
# Secrets are env-driven only (.env, gitignored). Nothing sensitive is committed.
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-irbis_access}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-irbis_access}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # No host port published by default — only the backend (same compose network)
    # reaches the DB. Uncomment to inspect from the host during dev:
    # ports:
    #   - "127.0.0.1:5433:5432"

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ── App ──────────────────────────────────────────────────────────────
      APP_HOST: "0.0.0.0"
      APP_PORT: "8080"
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET:?set APP_SECRET in .env}
      # ── Access store → PostgreSQL (prod backend, ADR-004) ────────────────
      ACCESS_BACKEND: "postgres"
      ACCESS_PG_DSN: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-irbis_access}"
      # ── Runtime sqlite stores (engines not yet on PG) → persisted volume ─
      NOTIFY_DB:  "/data/notify.db"
      CATALOG_DB: "/data/catalog.db"
      CIRC_DB:    "/data/circ.db"
      ACQ_DB:     "/data/acq.db"
      BP_DB:      "/data/bp.db"
      # ── IRBIS64 native server (optional; point at your live ИРБИС) ───────
      IRBIS_HOST:       ${IRBIS_HOST:-127.0.0.1}
      IRBIS_PORT:       ${IRBIS_PORT:-6666}
      IRBIS_USER:       ${IRBIS_USER:-MASTER}
      IRBIS_PASS:       ${IRBIS_PASS:-}
      IRBIS_WORKSTATION: ${IRBIS_WORKSTATION:-A}
      IRBIS_DB_DEFAULT: ${IRBIS_DB_DEFAULT:-IBIS}
      IRBIS_PUBLIC_DBS: ${IRBIS_PUBLIC_DBS:-IBIS}
    volumes:
      - backend-data:/data
    # No host port published — the proxy reaches the backend over the compose
    # network. Uncomment to hit the backend directly during dev:
    # ports:
    #   - "127.0.0.1:8080:8080"

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/certs:/etc/nginx/certs:ro

volumes:
  pgdata:
  backend-data:
