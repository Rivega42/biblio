# ─────────────────────────────────────────────────────────────────────────────
# Biblio reverse proxy — TLS termination + proxy to the backend (#207, epic #223)
#
# Topology: backend-serves-dist. nginx terminates TLS (self-signed for dev,
# real cert in prod) and reverse-proxies EVERYTHING to the backend, which serves
# both the JSON API and the built SPA. No static root here — keeps one source of
# truth for routing (server.py / static_files.py).
#
# Certs are mounted at /etc/nginx/certs (see docker-compose.yml + gen-cert.sh).
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;                 # don't leak nginx version

    # Upstream = the backend container (compose service name `backend`).
    upstream biblio_backend {
        server backend:8080;
        keepalive 32;
    }

    # ── HTTP :80 → redirect to HTTPS ─────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Allow ACME http-01 challenge in prod (certbot webroot), redirect rest.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS :443 → TLS termination + reverse proxy to backend ──────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # Self-signed for dev (gen-cert.sh); replace with a real cert in prod.
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers (baseline; tighten CSP per app needs in prod).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # HSTS — enable only once a REAL cert is in place (not for self-signed dev):
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 25m;        # full-text / scan uploads headroom

        # Everything (API + SPA + assets) goes to the backend.
        location / {
            proxy_pass http://biblio_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_read_timeout 60s;
        }
    }
}
